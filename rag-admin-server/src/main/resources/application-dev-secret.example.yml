# 复制为 application-dev-secret.yml 后按 DEV 环境实际情况填写。
# 该文件应仅本地使用，不要提交到仓库。

spring:
  datasource:
    url: jdbc:postgresql://your-postgres-host:5432/rag_admin?sslmode=disable
    username: your-postgres-username
    password: your-postgres-password
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: your-redis-host
      port: 6379
      password: your-redis-password
      database: 0

rag:
  storage:
    minio:
      endpoint: your-minio-domain-or-ip
      port: 9000
      use-ssl: false
      access-key: your-minio-access-key
      secret-key: your-minio-secret-key
      bucket-name: ragadmin
      public-url: http://your-minio-public-url:9000
  vector:
    milvus:
      base-url: http://your-milvus-host:19530
      token:
      enabled: true
  ai:
    default-provider: OLLAMA
    bailian:
      enabled: false
      base-url: https://dashscope.aliyuncs.com
      api-key: your-bailian-api-key
    ollama:
      enabled: true
      base-url: http://127.0.0.1:11434
      default-chat-model: qwen2.5:1.5b
      default-embedding-model: quentinz/bge-small-zh-v1.5
      timeout-seconds: 180
    zhipu:
      enabled: false
      base-url: https://open.bigmodel.cn/api/paas
      api-key: your-zhipu-api-key
      timeout-seconds: 60
  search:
    tavily:
      enabled: true
      base-url: https://api.tavily.com
      api-key: your-tavily-api-key
      timeout-seconds: 15
      search-depth: basic
      topic: general
      max-results: 5
  document:
    mineru:
      enabled: true
      base-url: https://mineru.net
      api-token: your-mineru-api-token
      model-version: vlm
      language: ch
      timeout-seconds: 60
      poll-interval-millis: 2000
      max-poll-attempts: 30
      max-pdf-pages: 600
    conversion:
      enabled: true
      libre-office-path: libreoffice
      timeout-seconds: 60
