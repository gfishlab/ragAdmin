# 复制为 application-local-secret.yml 后按本机 local 环境实际情况填写。
# 该文件应仅本地使用，不要提交到仓库。

spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/rag_admin?sslmode=disable
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ragadmin123
      database: 0

rag:
  storage:
    minio:
      endpoint: 127.0.0.1
      port: 9000
      use-ssl: false
      access-key: minioadmin
      secret-key: minioadmin123
      bucket-name: ragadmin
      public-url: http://127.0.0.1:9000
  vector:
    milvus:
      base-url: http://127.0.0.1:19530
      token:
      enabled: true
  ai:
    default-provider: OLLAMA
    bailian:
      enabled: false
      base-url: https://dashscope.aliyuncs.com
      api-key: your-bailian-api-key
    ollama:
      enabled: true
      base-url: http://127.0.0.1:11434
      default-chat-model: qwen2.5:1.5b
      default-embedding-model: quentinz/bge-small-zh-v1.5
      timeout-seconds: 180
    zhipu:
      enabled: false
      base-url: https://open.bigmodel.cn/api/paas
      api-key: your-zhipu-api-key
      timeout-seconds: 60
  search:
    tavily:
      enabled: true
      base-url: https://api.tavily.com
      api-key: your-tavily-api-key
      timeout-seconds: 15
      search-depth: basic
      topic: general
      max-results: 5
  document:
    mineru:
      # local 环境默认可先关闭，待提供公网 MinIO 和 Token 后再开启。
      enabled: false
      base-url: https://mineru.net
      api-token: your-mineru-api-token
      model-version: vlm
      language: ch
      timeout-seconds: 60
      poll-interval-millis: 2000
      max-poll-attempts: 30
      max-pdf-pages: 600
