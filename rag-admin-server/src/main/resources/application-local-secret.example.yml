# 复制为 application-local-secret.yml 后按本机实际情况填写。
# 该文件应仅本地使用，不要提交到仓库。
rag:
  ai:
    bailian:
      # 是否启用百炼，可按需覆盖。
      enabled: true
      # 百炼网关地址，通常无需修改。
      base-url: https://dashscope.aliyuncs.com
      api-key: your-bailian-api-key
    ollama:
      # 是否启用 Ollama 本地模型。
      # 如果本机未安装或暂时不用 Ollama，可先改为 false，并切换到其他可用提供方。
      enabled: true
      # Ollama 服务地址，默认本机 11434 端口。
      base-url: http://127.0.0.1:11434
      # 本地默认聊天模型；如需替换，记得与 docker/compose/docker-compose.yml 中 ollama-init
      # 的预拉取模型保持一致，避免首次联调时数据库默认模型已登记但本地实际未安装。
      default-chat-model: qwen2.5:1.5b
      # 本地默认向量模型；如需替换，同样建议同步调整 ollama-init 预拉取列表。
      default-embedding-model: quentinz/bge-small-zh-v1.5
      # 请求超时（秒），本地模型推理较慢可适当调大。
      timeout-seconds: 180
    zhipu:
      # 是否启用智谱 AI 模型。
      enabled: false
      # 智谱 API 网关地址，通常无需修改。
      base-url: https://open.bigmodel.cn/api/paas
      # 智谱 API Key，只允许放在本地私有配置或环境变量中。
      api-key: your-zhipu-api-key
      timeout-seconds: 60
  search:
    tavily:
      # 是否启用 Tavily 联网搜索。
      enabled: true
      # Tavily API 网关地址，通常无需修改。
      base-url: https://api.tavily.com
      # Tavily API Key，只允许放在本地私有配置或环境变量中。
      api-key: your-tavily-api-key
      timeout-seconds: 15
      search-depth: basic
      topic: general
      max-results: 5
