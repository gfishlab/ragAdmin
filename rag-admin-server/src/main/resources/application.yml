spring:
  application:
    name: rag-admin-server
  profiles:
    default: local
  jackson:
    default-property-inclusion: non_null
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  config: classpath:logback-spring.xml

rag:
  storage:
    minio:
      endpoint:
      port: 9000
      use-ssl: false
      access-key:
      secret-key:
      bucket-name:
      public-url:
