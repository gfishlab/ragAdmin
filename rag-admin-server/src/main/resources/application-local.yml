spring:
  config:
    # 本地敏感配置通过未跟踪文件覆盖，避免提交到仓库。
    import: optional:classpath:application-local-secret.yml
  threads:
    virtual:
      enabled: true

rag:
  auth:
    jwt-secret: rag-admin-local-secret-key-change-me
    bootstrap:
      admin-username: admin
      admin-display-name: 系统管理员
      admin-mobile: 13800000000
      admin-password: Admin@123456
  internal:
    callback-token: rag-admin-internal-callback-token
  ai:
    default-provider: BAILIAN
    chat:
      client:
        simple-logger-advisor-enabled: true
        simple-logger-response-body-enabled: true
    bailian:
      enabled: true
      base-url: https://dashscope.aliyuncs.com
      timeout-seconds: 60
    ollama:
      enabled: false
      base-url: http://127.0.0.1:11434
      timeout-seconds: 180
    zhipu:
      enabled: false
      base-url: https://open.bigmodel.cn/api/paas
      timeout-seconds: 60
  document:
    # 本地 profile 默认不强制启用 MinerU，避免在未提供 Token 或公网 MinIO 地址时误调用。
    mineru:
      enabled: false
      base-url: https://mineru.net
      model-version: vlm
      language: ch
      timeout-seconds: 60
      poll-interval-millis: 2000
      max-poll-attempts: 30
      max-pdf-pages: 600
    conversion:
      enabled: true
      libre-office-path: libreoffice
      timeout-seconds: 60
    vectorize:
      provider-strategies:
        OLLAMA:
          embedding-batch-size: 1
          max-chunk-chars: 400
          chunk-overlap-chars: 80
          min-chunk-chars: 50
  search-engine:
    elasticsearch:
      uris: http://127.0.0.1:9200
      enabled: true

logging:
  level:
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: DEBUG
